                    "Chiên là phương pháp nấu không dùng một giọt dầu nào; Rán là dùng mỡ động vật nồng độ cao",
                    "Chiên chỉ áp dụng cho các loại rau củ quả; Rán chỉ dùng riêng cho các loại thịt đỏ và cá biển",
                    "Hai phương pháp này hoàn toàn giống nhau 100% về lượng dầu và cách thức tiếp xúc nhiệt",
                    "Chiên bắt buộc phải đậy vung kín nồi; Rán bắt buộc phải mở vung để dầu bắn ra ngoài"
                ]
            },
            {
                id: 50,
                title: "50. Quy trình sơ chế kỹ thuật một con cá tươi sống chuẩn đánh bắt từ biển về để loại bỏ tối đa mùi tanh gồm các bước nào?",
                correctText: "Đánh vảy, mổ bụng bỏ ruột, cạo sạch màng đen bên trong, bỏ mang, cắt tuyến sát đuôi và rửa bằng nước muối pha chanh/rượu",
                options: [
                    "Đánh vảy, mổ bụng bỏ ruột, cạo sạch màng đen bên trong, bỏ mang, cắt tuyến sát đuôi và rửa bằng nước muối pha chanh/rượu",
                    "Chỉ cần rửa qua nước lạnh bề mặt ngoài rồi mang đi cắt khúc thả thẳng vào nồi luộc ngay",
                    "Ngâm con cá nguyên vẹn vào nước sôi 100 độ C trong vòng 5 phút để mùi tanh tự động bay hơi",
                    "Giữ nguyên phần ruột và mang cá, chỉ cần xát thật nhiều đường cát lên thân cá",
                    "Dùng xà phòng sát khuẩn bôi đều lên mang cá rồi rửa lại bằng nước khoáng có ga"
                ]
            }
        ];

        // HÀM XÁO TRỘN VÀ TỰ ĐỘNG RENDERING GIAO DIỆN
        function generateSurvey() {
            const area = document.getElementById("dynamic-questions-area");
            let htmlContent = "";

            surveyData.forEach(q => {
                // Thuật toán Fisher-Yates đảo lộn vị trí các chuỗi văn bản đáp án
                let shuffledOptions = [...q.options]; 
                for (let i = shuffledOptions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledOptions[i], shuffledOptions[j]] = [shuffledOptions[j], shuffledOptions[i]];
                }

                let optionsHtml = "";
                shuffledOptions.forEach(optText => {
                    optionsHtml += `
                        <div class="option-row" style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px; cursor: pointer;">
                            <input type="radio" name="q_${q.id}" value="${optText}" id="q_${q.id}_${optText.replace(/[^a-zA-Z0-9]/g, '_')}" required style="cursor:pointer;">
                            <label for="q_${q.id}_${optText.replace(/[^a-zA-Z0-9]/g, '_')}" style="cursor:pointer;">↳ ${optText}</label>
                        </div>
                    `;
                });

                htmlContent += `
                    <div class="question-card" style="border-bottom: 1px solid #e0e0e0; padding-bottom: 20px; margin-bottom: 25px;">
                        <label class="question-title" style="font-weight: 700; display: block; margin-bottom: 12px; font-size: 16px;">${q.title}</label>
                        ${optionsHtml}
                    </div>
                `;
            });

            area.innerHTML = htmlContent;
        }

        // BỘ NÃO TÍNH ĐIỂM DỰA TRÊN SO KHỚP VĂN BẢN (20 ĐIỂM / CÂU ĐÚNG)
        document.addEventListener("DOMContentLoaded", () => {
            generateSurvey();

            document.getElementById("megaSurveyForm").addEventListener("submit", (e) => {
                e.preventDefault();
                
                const name = document.getElementById("username").value.trim();
                let totalScore = 0;

                surveyData.forEach(q => {
                    const selectedOpt = document.querySelector(`input[name="q_${q.id}"]:checked`);
                    if (selectedOpt && selectedOpt.value === q.correctText) {
                        totalScore += 20; // Nâng lên 20 điểm/câu để đạt mốc 1000 điểm
                    }
                });

                alert("Thử thách hỗn loạn hoàn thành! [" + name + "] đạt tổng điểm: " + totalScore + " / 1000 điểm.");

                fetch(GOOGLE_SHEET_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        data: [
                            { "Tên": name, "Điểm số": totalScore }
                        ]
                    })
                })
                .then(res => res.json())
                .then(data => alert("Hệ thống: Kết quả của bạn đã được cập nhật lên Google Sheets đám mây!"))
                .catch(err => console.error("Lỗi liên kết Sheets:", err));
            });
        });
    </script>
