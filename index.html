        function generateSurvey() {
            const area = document.getElementById("dynamic-questions-area");
            let htmlContent = "";

            surveyData.forEach(q => {
                let optionsHtml = "";
                q.options.forEach(opt => {
                    optionsHtml += `
                        <div class="option-row" onclick="handleRadioClick(${q.id}, '${opt.value}', '${q.triggerValue}')">
                            <input type="radio" name="q_${q.id}" value="${opt.value}" id="q_${q.id}_${opt.value}" onchange="handleRadioClick(${q.id}, '${opt.value}', '${q.triggerValue}')" required style="cursor:pointer;">
                            <label for="q_${q.id}_${opt.value}" style="cursor:pointer;">${opt.text}</label>
                        </div>
                    `;
                });

                let subQuestionsHtml = "";
                q.subQuestions.forEach(sub => {
                    if (sub.type === "text") {
                        subQuestionsHtml += `
                            <div class="question-group">
                                <label class="sub-q-title">${sub.title}</label>
                                <input type="text" name="sub_${sub.id}" id="sub_${sub.id}" class="input-field" placeholder="${sub.placeholder}" style="margin-bottom:10px;">
                            </div>
                        `;
                    } else if (sub.type === "number") {
                        subQuestionsHtml += `
                            <div class="question-group">
                                <label class="sub-q-title">${sub.title}</label>
                                <input type="number" name="sub_${sub.id}" id="sub_${sub.id}" min="${sub.min}" max="${sub.max}" class="input-field" placeholder="Điền số" style="width:120px; margin-bottom:10px;">
                            </div>
                        `;
                    } else if (sub.type === "radio") {
                        let subOpts = "";
                        sub.options.forEach((so, idx) => {
                            subOpts += `
                                <div class="option-row sub-option">
                                    <input type="radio" name="sub_${sub.id}" id="sub_${sub.id}_${idx}" value="${so}" style="cursor:pointer;">
                                    <label for="sub_${sub.id}_${idx}" style="cursor:pointer; margin-right:15px;">${so}</label>
                                </div>
                            `;
                        });
                        subQuestionsHtml += `
                            <div class="question-group">
                                <label class="sub-q-title">${sub.title}</label>
                                ${subOpts}
                            </div>
                        `;
                    }
                });

                htmlContent += `
                    <div class="question-card">
                        <label class="question-title">${q.title}</label>
                        ${optionsHtml}
                        <div id="sub-box-${q.id}" class="sub-question-box" style="display:none; margin-left:20px; margin-top:10px;">
                            ${subQuestionsHtml}
                        </div>
                    </div>
                `;
            });

            area.innerHTML = htmlContent;
        }

        function handleRadioClick(qId, selectedValue, triggerValue) {
            const subBox = document.getElementById(`sub-box-${qId}`);
            const radioButton = document.getElementById(`q_${q.id}_${selectedValue}`);
            if (radioButton) radioButton.checked = true;

            if (!subBox) return;

            if (selectedValue === triggerValue) {
                subBox.style.display = "block";
                subBox.querySelectorAll('input').forEach(input => input.required = true);
            } else {
                subBox.style.display = "none";
                subBox.querySelectorAll('input').forEach(input => {
                    input.required = false;
                    if (input.type === 'radio') input.checked = false;
                    else input.value = '';
                });
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            generateSurvey();

            document.getElementById("megaSurveyForm").addEventListener("submit", (e) => {
                e.preventDefault();
                const name = document.getElementById("username").value.trim();
                let totalScore = 0;

                surveyData.forEach(q => {
                    const selectedOpt = document.querySelector(`input[name="q_${q.id}"]:checked`);
                    if (selectedOpt) {
                        totalScore += q.score;

                        if (selectedOpt.value === q.triggerValue) {
                            q.subQuestions.forEach(sub => {
                                if (sub.type === 'radio') {
                                    if (document.querySelector(`input[name="sub_${sub.id}"]:checked`)) {
                                        totalScore += sub.score;
                                    }
                                } else {
                                    const answer = document.getElementById(`sub_${sub.id}`).value.trim();
                                    if (answer !== "") {
                                        totalScore += sub.score;
                                    }
                                }
                            });
                        }
                    }
                });

                alert(`Chúc mừng [${name}]! Bạn đạt được tổng: ${totalScore} điểm thử thách.`);

                fetch(GOOGLE_SHEET_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [{ "Tên": name, "Điểm số": totalScore }] })
                })
                .then(res => res.json())
                .then(() => alert("Hệ thống: Đã cập nhật kết quả khảo sát của bạn vào Google Sheets trực tuyến thành công!"))
                .catch(err => console.error("Lỗi gửi dữ liệu Sheets:", err));
            });
        });
    </script>
</body>
</html>
